<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <style>
    body{font-family: Arial, sans-serif; margin:24px}
    table{width:100%; border-collapse:collapse}
    th,td{border:1px solid #ddd; padding:8px}
    th{background:#f5f5f5}
  </style>
</head>
<body>
  <h1>ربحية العميل (صافي)</h1>
  <div>الفترة: {{fiscal_period}} | العميل: {{customer_name}}</div>
  <br/>
  <table>
    <thead><tr><th>البند</th><th>المبلغ</th></tr></thead>
    <tbody>
      <tr><td>إيراد العميل</td><td>{{revenue}}</td></tr>
      <tr><td>تكلفة مباشرة</td><td>{{direct_cost}}</td></tr>
      <tr><td>حصة المصروفات العامة</td><td>{{overhead_share}}</td></tr>
      <tr><td><b>صافي الربح</b></td><td><b>{{net_profit}}</b></td></tr>
      <tr><td>هامش صافي</td><td>{{net_margin}}%</td></tr>
    </tbody>
  </table>
</body>
</html>
