<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <style>
    body{font-family: Arial, sans-serif; margin:24px}
    table{width:100%; border-collapse:collapse}
    th,td{border:1px solid #ddd; padding:8px}
    th{background:#f5f5f5}
  </style>
</head>
<body>
  <h1>قائمة الاستثناءات (تدقيق)</h1>
  <div>الفترة: {{fiscal_period}}</div>
  <br/>
  <table>
    <thead><tr><th>النوع</th><th>المستند</th><th>السبب</th><th>الدرجة</th><th>الحالة</th></tr></thead>
    <tbody>
      {{#rows}}
      <tr><td>{{doc_type}}</td><td>{{doc_id}}</td><td>{{reason}}</td><td>{{score}}</td><td>{{status}}</td></tr>
      {{/rows}}
    </tbody>
  </table>
</body>
</html>
