<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>التحقق من المستند</title>
<style>
  body{font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin:0; padding:24px; background:#f6f7f9;}
  .wrap{max-width:720px; margin:0 auto;}
  .card{background:#fff; border:1px solid #eee; border-radius:16px; padding:16px;}
  .k{color:#666; font-size:12px}
  .v{font-weight:800}
  .ok{color:#16a34a}
  .bad{color:#dc2626}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 10px 0">التحقق من المستند</h2>
      <div class="k">رقم المستند</div>
      <div class="v">{{doc_no}}</div>
      <hr style="border:none;border-top:1px solid #eee;margin:12px 0"/>
      <div class="{{status_class}}">{{status_text}}</div>
      <div style="margin-top:12px">
        <div class="k">النوع</div><div class="v">{{entity_type}}</div>
        <div class="k" style="margin-top:6px">الإصدار</div><div class="v">{{version_no}}</div>
        <div class="k" style="margin-top:6px">التاريخ</div><div class="v">{{created_at}}</div>
      </div>
    </div>
  </div>
</body>
</html>
