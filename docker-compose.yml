version: '3.8'
services:
  app:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ghaith_erp
      - SPRING_DATASOURCE_USERNAME=ghaith_admin
      - SPRING_DATASOURCE_PASSWORD=ghaith_pass
      - APP_JWT_SECRET=${APP_JWT_SECRET:-VmFsaWRCYXNlNjRTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjMyQnl0ZXM=}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ghaith_erp
      POSTGRES_USER: ghaith_admin
      POSTGRES_PASSWORD: ghaith_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  ghaith_backups:


networks:
  frontend:
  backend:
