spring:
  application:
    name: ghaith-erp
  logging:
    file:
      name: logs/ghaith-erp.log
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:ghaith_erp}
    username: ${DB_USER:ghaith_admin}
    password: ${DB_PASSWORD:ghaith_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${SMTP_HOST:smtp.hostinger.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USER:door@door.sa}
    password: ${SMTP_PASS:Barhom@@2064}
    properties:
      mail:
        smtp:
          auth: True
          starttls:
            enable: False
          ssl:
            enable: True
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

app:
  upload-dir: uploads
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:VmFsaWRCYXNlNjRTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjMyQnl0ZXM=}
    expiration: ${APP_JWT_EXPIRATION:86400000}
